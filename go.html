<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jiayi Su</title>
  <link rel="icon" type="image/png" href="images/icons/seal_icons.png">
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;height:100%}
    body{display:flex;flex-direction:column;background:#faf9f7;
         font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
    .topbar{flex:0 0 auto;display:flex;align-items:center;gap:10px;
            padding:8px 16px;border-bottom:1px solid #e0dbd3;font-size:13px;color:#555}
    .topbar a{color:#1c4f8a;text-decoration:none}
    #view{flex:1 1 auto;border:0;width:100%}
    .msg{padding:48px;text-align:center;color:#555}
    /* tracker loads but isn't shown; the request itself records the visit */
    .hidden-tracker{position:absolute;left:-9999px;top:0;width:1px;height:1px;overflow:hidden}
  </style>
</head>
<body>
  <div class="topbar"><a href="/">&larr; jiayisu.com</a></div>
  <iframe id="view" title="document"></iframe>

  <!-- ===== visitor tracking for this shared link ===== -->
  <!-- Vercount: adds to your site-wide visitor count -->
  <script defer src="https://cn.vercount.one/js"></script>
  <!-- MapMyVisitors: loading globe.js?d=<token> records this visit (location/time/referrer)
       in your MapMyVisitors dashboard + globe. Hidden here; the request is what counts. -->
  <div class="hidden-tracker" aria-hidden="true">
    <script type="text/javascript" id="mmvst_globe" src="//mapmyvisitors.com/globe.js?d=n9he1nNgcqR5_h28qvUNUvviwGsijrfQI8AidWZTEHY"></script>
  </div>

  <script>
    (function(){
      var p = new URLSearchParams(location.search).get('f') || '';
      // SECURITY: only allow same-site relative paths — block absolute, scheme, and //host URLs
      var ok = p && !/^(https?:)?\/\//i.test(p) && !/^[a-zA-Z][\w+.-]*:/.test(p);
      var f = document.getElementById('view');
      // Opened without a valid ?f= (e.g. someone visits go.html directly) → just go home.
      if(!ok){ location.replace('/'); return; }
      f.src = encodeURI(p.replace(/^\/+/, ''));
    })();
  </script>
</body>
</html>
